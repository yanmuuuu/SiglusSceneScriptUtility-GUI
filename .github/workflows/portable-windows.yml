name: Portable Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "gui-v*"

jobs:
  portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - name: Build portable distribution (with bundled ffmpeg)
        run: uv run python scripts/build_portable.py

      - uses: actions/upload-artifact@v6
        with:
          name: SiglusSSU-GUI-portable-windows
          path: |
            dist/SiglusSSU-GUI-portable.zip
            dist/SiglusSSU-GUI/

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/gui-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SiglusSSU-GUI-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
